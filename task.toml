artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a JSON traffic summary."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task requires parsing structured information from access-log lines, handling repeated clients and paths, and producing an exact JSON artifact that satisfies multiple behavioral checks."
solution_explanation = "Read each non-empty access-log line, count requests and distinct client addresses, extract request paths, select the most frequent path with deterministic tie-breaking, and write the required JSON report."
verification_explanation = "The verifier independently parses the access log and checks the report format, request count, unique client count, and most frequent path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []